spring:
  application:
    name: LedgerOne
  datasource:
    url: "${DATABASE_JDBC_URL:jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:ledgerone}}"
    username: ${DATABASE_USERNAME:${DATABASE_USER:ledgerone}}
    password: ${DATABASE_PASSWORD:ledgerone}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:${SERVER_PORT:8080}}

ledgerone:
  security:
    jwt-secret: ${JWT_SECRET:local-development-secret-change-me-to-at-least-32-bytes}
    access-token-minutes: ${ACCESS_TOKEN_MINUTES:20}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:7}
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  trading:
    fee-rate: ${TRADING_FEE_RATE:0.0010}
    min-fee: ${TRADING_MIN_FEE:1.00}
    max-fee: ${TRADING_MAX_FEE:50.00}
  market:
    simulator-enabled: ${MARKET_SIMULATOR_ENABLED:true}
    quotes:
      enabled: ${MARKET_LIVE_PRICES_ENABLED:true}
      cache-seconds: ${MARKET_QUOTE_CACHE_SECONDS:60}
      finnhub-api-key: ${FINNHUB_API_KEY:}
      finnhub-base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
      quote-url-template: ${MARKET_QUOTE_URL_TEMPLATE:https://api.nasdaq.com/api/quote/{symbol}/info?assetclass=stocks}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
