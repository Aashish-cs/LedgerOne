spring:
  application:
    name: LedgerOne
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ledgerone}
    username: ${DATABASE_USERNAME:ledgerone}
    password: ${DATABASE_PASSWORD:ledgerone}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

ledgerone:
  security:
    jwt-secret: ${JWT_SECRET:local-development-secret-change-me-to-at-least-32-bytes}
    access-token-minutes: ${ACCESS_TOKEN_MINUTES:20}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:7}
  trading:
    fee-rate: ${TRADING_FEE_RATE:0.0010}
    min-fee: ${TRADING_MIN_FEE:1.00}
    max-fee: ${TRADING_MAX_FEE:50.00}
  market:
    simulator-enabled: ${MARKET_SIMULATOR_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
