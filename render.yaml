services:
  - type: web
    name: ledgerone-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://ledger-one-mocha.vercel.app,http://localhost:5173,http://127.0.0.1:5173"
      - key: MARKET_SIMULATOR_ENABLED
        value: "true"
      - key: ACCESS_TOKEN_MINUTES
        value: "20"
      - key: REFRESH_TOKEN_DAYS
        value: "7"

databases:
  - name: ledgerone-db
    databaseName: ledgerone
    user: ledgerone
    plan: free
