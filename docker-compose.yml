services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerone
      POSTGRES_USER: ledgerone
      POSTGRES_PASSWORD: ledgerone
    ports:
      - "5432:5432"
    volumes:
      - ledgerone-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerone -d ledgerone"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/ledgerone
      DATABASE_USERNAME: ledgerone
      DATABASE_PASSWORD: ledgerone
      JWT_SECRET: local-compose-secret-change-for-real-deployments-32-bytes
      MARKET_SIMULATOR_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ledgerone-postgres:
